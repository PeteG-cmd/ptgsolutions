<app-brands />
<app-audiences />
<app-services />
<app-about />
<app-work-preview />
<app-testimonial />

<section class="cta">
  <img
    src="assets/logo/ptg-tree-mark-white.png"
    alt=""
    aria-hidden="true"
    class="cta__watermark"
  />
  <div class="container--narrow cta__inner">
    <h2 class="cta__title">Got something to build — or improve?</h2>
    <p class="cta__text">
      Whether you're launching a new product or making an established business run leaner, smarter
      and more securely, tell us what you're working on and we'll help you take the next step.
    </p>
    <div class="cta__actions">
      <a class="btn btn--accent btn--lg" routerLink="/contact">
        Start a conversation <app-icon name="arrow-right" [size]="18" />
      </a>
      <a class="btn btn--ghost btn--lg btn--on-dark" [href]="'mailto:' + site.email">
        {{ site.email }}
      </a>
    </div>
  </div>
</section>
