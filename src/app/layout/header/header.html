<header class="site-header">
  <div class="container site-header__inner">
    <a class="brand" routerLink="/" (click)="closeMenu()" aria-label="PTG Solutions home">
      <img src="assets/logo/ptg-logo-forest.png" alt="PTG Solutions" class="brand__logo" />
    </a>

    <button
      class="nav-toggle"
      type="button"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation"
      (click)="toggleMenu()"
    >
      <app-icon [name]="menuOpen() ? 'x' : 'menu'" />
    </button>

    <nav class="site-nav" [class.is-open]="menuOpen()">
      @for (link of links; track link.label) {
        @if (link.route) {
          <a
            class="site-nav__link"
            [routerLink]="link.route"
            routerLinkActive="active"
            (click)="closeMenu()"
            >{{ link.label }}</a
          >
        } @else {
          <a
            class="site-nav__link"
            routerLink="/"
            [fragment]="link.fragment"
            (click)="closeMenu()"
            >{{ link.label }}</a
          >
        }
      }

      <span class="site-nav__divider" aria-hidden="true"></span>

      <a class="site-nav__link site-nav__signin" routerLink="/login" (click)="closeMenu()"
        >Sign in</a
      >
      <a class="btn btn--accent nav-cta" routerLink="/contact" (click)="closeMenu()"
        >Start a conversation</a
      >
    </nav>
  </div>
</header>
